name: Map / gameplay bug
description: Report a map, collision, gap, or race bug with spray paint evidence
title: "[map] "
labels:
  - bug
  - map
body:
  - type: markdown
    attributes:
      value: |
        For visual bugs, use in-game **spray paint** (F3 → Spray → Export) and attach
        `artifacts/dev_annotation_latest.json` + `.png`. See [BUG_REPORT_WORKFLOW.md](docs/BUG_REPORT_WORKFLOW.md).

  - type: input
    id: map
    attributes:
      label: Map ID
      placeholder: broken_bridge_pass
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: Zombies should fall through the gap void outside the crossing planks.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: Zombies walk on black void tiles without falling.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Stage race on Broken Bridge
        2. Go
        3. Watch zombies at z ≈ -44 gap section
    validations:
      required: true

  - type: checkboxes
    id: evidence
    attributes:
      label: Evidence attached
      options:
        - label: artifacts/dev_annotation_latest.json (spray export)
        - label: artifacts/dev_annotation_latest.png (screenshot)
        - label: Headless test name that should catch this

  - type: textarea
    id: constraints
    attributes:
      label: Do not touch
      description: Protected systems or out-of-scope areas
      placeholder: Finish contract, OOB authority, Twitch HUD

  - type: textarea
    id: tests
    attributes:
      label: Suggested headless tests
      placeholder: broken_bridge_gap_walk_test.gd, --tier=map
